lt;mxPoint x=\&quot;449.5\&quot; y=\&quot;1520\&quot; as=\&quot;sourcePoint\&quot; /&gt;\n            &lt;mxPoint x=\&quot;210\&quot; y=\&quot;1520\&quot; as=\&quot;targetPoint\&quot; /&gt;\n          &lt;/mxGeometry&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;3tNoCV5g4BuNFWaW4ihS-262\&quot; edge=\&quot;1\&quot; parent=\&quot;3tNoCV5g4BuNFWaW4ihS-263\&quot; style=\&quot;html=1;verticalAlign=bottom;endArrow=open;dashed=1;endSize=8;curved=0;rounded=0;\&quot; value=\&quot;show success, refresh data/list\&quot;&gt;\n          &lt;mxGeometry relative=\&quot;1\&quot; as=\&quot;geometry\&quot;&gt;\n            &lt;mxPoint x=\&quot;210\&quot; y=\&quot;1594\&quot; as=\&quot;sourcePoint\&quot; /&gt;\n            &lt;mxPoint x=\&quot;10\&quot; y=\&quot;1594\&quot; as=\&quot;targetPoint\&quot; /&gt;\n          &lt;/mxGeometry&gt;\n        &lt;/mxCell&gt;\n        &lt;mxCell id=\&quot;3tNoCV5g4BuNFWaW4ihS-266\&quot; parent=\&quot;1\&quot; style=\&quot;text;html=1;whiteSpace=wrap;strokeColor=none;fillColor=none;align=left;verticalAlign=middle;rounded=0;fontSize=13;\&quot; value=\&quot;&amp;lt;ol&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Chuẩn hóa tiêu chí deduplicate cho đúng với schema&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ol&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Nếu là import từ broker: deduplicate theo (account_id, source, external_order_no). Có thể bổ sung trade_date nếu cần giảm trùng giả&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Nếu là manual create: xác định rõ có deduplicate hay không. Nếu có thì dùng business key (trade_date, instrument_id, type, order_quantity, order_price) hoặc hash&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;ol start=&amp;quot;2&amp;quot;&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Bổ sung nhánh kiểm tra thiếu tiền khi BUY&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ol&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Tính total_cost = matched_quantity * matched_price + fee_amount + tax_amount&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Nếu available_cash hoặc buying_power &amp;amp;lt; total_cost thì trả lỗi và rollback transaction&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;ol start=&amp;quot;3&amp;quot;&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Bổ sung nhánh kiểm tra bán quá số lượng khi SELL&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ol&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Lấy current_quantity từ positions&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Nếu sell_quantity &amp;amp;gt; current_quantity thì trả lỗi và rollback&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Xác định rõ có cho phép short sell hay không. Nếu không thì phải chặn&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;ol start=&amp;quot;4&amp;quot;&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Bổ sung nhánh kiểm tra thiếu tiền khi WITHDRAW&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ol&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Nếu withdraw_amount &amp;amp;gt; available_cash thì trả lỗi và rollback&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Nếu có khái niệm pending_cash thì xác định rule: chỉ được rút từ available_cash hay cả pending_cash&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;ol start=&amp;quot;5&amp;quot;&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Làm rõ matched_quantity và matched_price khi create transaction&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ol&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Nếu create transaction đồng nghĩa đã khớp lệnh: set matched_quantity = order_quantity, matched_price = order_price&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Nếu có trạng thái khớp lệnh từng phần: cần rule cập nhật matched_* theo từng lần khớp hoặc theo file import&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;ol start=&amp;quot;6&amp;quot;&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Bổ sung xử lý instrument_id nullable theo type&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ol&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Với DEPOSIT/WITHDRAW: instrument_id phải null, không gọi Position manage&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Với BUY/SELL: instrument_id bắt buộc có, nếu null thì trả lỗi&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;ol start=&amp;quot;7&amp;quot;&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Bổ sung phần rollback khi lỗi ở giữa luồng&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ol&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Nếu insert transaction record xong nhưng update position/balance lỗi: rollback toàn bộ&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Nên ghi rõ BEGIN, COMMIT, ROLLBACK trong sơ đồ cho nhánh lỗi&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;ol start=&amp;quot;8&amp;quot;&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Bổ sung kiểm tra trạng thái position khi SELL&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ol&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Nếu position không tồn tại thì trả lỗi&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Nếu position tồn tại nhưng quantity = 0 thì trả lỗi (hoặc xử lý theo rule của bạn)&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;ol start=&amp;quot;9&amp;quot;&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Làm rõ các field balance được cập nhật trong từng loại giao dịch&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ol&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;BUY: available_cash giảm, buying_power giảm (hoặc chỉ available_cash nếu không dùng buying_power)&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;SELL: available_cash tăng, buying_power tăng&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;DEPOSIT: total_cash tăng, available_cash tăng, buying_power tăng (tùy định nghĩa)&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;WITHDRAW: total_cash giảm, available_cash giảm, buying_power giảm&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;ol start=&amp;quot;10&amp;quot;&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Bổ sung quy ước làm tròn và đơn vị tiền tệ&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ol&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Xác định rounding cho price, fee, tax, pnl theo currency/unit&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Tránh sai số tích lũy khi tính avg_cost và realized_pnl&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;ol start=&amp;quot;11&amp;quot;&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Bổ sung điều kiện đồng thời khi update (concurrency)&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ol&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Nếu có khả năng tạo nhiều transaction cùng lúc: cần locking hoặc optimistic version để tránh race condition làm sai quantity/cash&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Ví dụ: update positions/balances theo dạng atomic update (SET value = value + delta) hoặc có version column&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;&amp;lt;ol start=&amp;quot;12&amp;quot;&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Bổ sung output trả về sau khi tạo thành công&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ol&amp;gt;&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Trả transaction_id và dữ liệu snapshot cần cho UI refresh (transaction vừa tạo, position mới, balance mới)&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;li&amp;gt;&amp;lt;p&amp;gt;&amp;lt;font&amp;gt;Hoặc xác định rõ UI sẽ gọi lại API list để refresh dữ liệu&amp;lt;/font&amp;gt;&amp;lt;/p&amp;gt;&amp;lt;/li&amp;gt;&amp;lt;/ul&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;\n          &lt;mxGeometry height=\&quot;1200\&quot; width=\&quot;1360\&quot; x=\&quot;1720\&quot; y=\&quot;1460\&quot; as=\&quot;geometry\&quot; /&gt;\n        &lt;/mxCell&gt;\n      &lt;/root&gt;\n    &lt;/mxGraphModel&gt;\n  &lt;/diagram&gt;\n&lt;/mxfile&gt;\n&quot;}"></div>
